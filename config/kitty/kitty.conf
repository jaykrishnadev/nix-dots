# vim:fileencoding=utf-8:foldmethod=marker

font_size        16.0
disable_ligatures never
mouse_hide_wait -2.0

# Performance
sync_to_monitor yes
scrollback_lines 20000
scrollback_pager_history_size 256

# Cursor
cursor_blink_interval 0
cursor_shape beam
shell_integration no-cursor

cursor_trail  1

# Scrollback
scrollback_pager nvim -c "set signcolumn=no showtabline=0" -c "autocmd TermOpen * startinsert" -c "terminal"

# Window
window_padding_width 10

clipboard_control write-clipboard read-clipboard write-primary read-primary

# Tabs
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    1

tab_title_template "{index}: {title}"

map alt+enter new_tab_with_cwd
map alt+q close_tab

map alt+h previous_tab
map alt+l next_tab

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

map alt+shift+h move_tab_backward
map alt+shift+l move_tab_forward


# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="GeistMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
